<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive</title>
    <style>
        :root { --bg: #ffffff; --text: #111111; --subtle: #f5f5f7; --accent: #0071e3; --border: #e5e5e5; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; padding: 100px 20px; }
        header { border-bottom: 1px solid var(--border); padding-bottom: 40px; margin-bottom: 60px; }
        h1 { font-size: 2.5rem; letter-spacing: -0.02em; margin: 0; }
        .meta { color: #86868b; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; margin-top: 10px; }
        .card { background: var(--subtle); padding: 40px; border-radius: 18px; margin-bottom: 24px; transition: 0.2s; text-decoration: none; display: block; color: inherit; }
        .card:hover { transform: scale(1.01); background: #f0f0f2; }
        h2 { margin-top: 0; font-size: 1.5rem; }
        .cta { color: var(--accent); font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>The Archive</h1>
            <div class="meta">EST. 2026 | </div>
        </header>

         <a href="model.html" class="card">
            <h2>01. Systems Visualization</h2>
            <p>Theoretical hardware inspection. WebXR-enabled 1:1 scale environment.</p>
            <span class="cta">Open Lab →</span>
        </a>

        <a href="chart.html" class="card">
            <h2>02. Trajectory Analysis</h2>
            <p>Market probability clouds and self-teaching compression simulations.</p>
            <span class="cta">Open Lab →</span>
        </a>

        <a href="lab.html">Enter the Lab</a>

        <footer style="margin-top: 100px; color: #86868b; font-size: 0.8rem;">
            Common Good
        </footer>
    </div>
</body>
</html>
