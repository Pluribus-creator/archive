<!DOCTYPE html>
<html>
<head>
    <title>PLURIBUS | Trajectory</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .back-btn { position: absolute; top: 30px; left: 30px; text-decoration: none; color: #86868b; font-weight: 600; }
        .chart-wrap { width: 80%; max-width: 900px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← EXIT LAB</a>
    <div class="chart-wrap">
        <canvas id="investingChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('investingChart').getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, 0, 400);
        grad.addColorStop(0, 'rgba(0, 113, 227, 0.3)');
        grad.addColorStop(1, 'rgba(255, 255, 255, 0)');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['2020', '21', '22', '23', '24', '25', '26'],
                datasets: [{
                    data: [100, 130, 125, 180, 240, 310, 480],
                    borderColor: '#0071e3',
                    borderWidth: 4,
                    fill: true,
                    backgroundColor: grad,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { x: { grid: { display: false } }, y: { display: false } }
            }
        });
    </script>
</body>
</html>
